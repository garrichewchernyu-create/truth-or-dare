<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truth or Dare</title>
<style>
  :root {
    --bg: #1a1722;
    --bg-card: #241f30;
    --pink: #ff3d7f;
    --yellow: #ffd23f;
    --teal: #3ddad7;
    --text: #f5f0ff;
    --text-dim: #9d93b3;
    --truth-color: #3ddad7;
    --dare-color: #ff3d7f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,61,127,0.12), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(61,218,215,0.10), transparent 40%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  h1.logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 900;
    font-style: italic;
    font-size: 3rem;
    text-align: center;
    letter-spacing: -1px;
    margin-bottom: 4px;
    line-height: 1;
  }
  h1.logo span:first-child { color: var(--truth-color); }
  h1.logo span:last-child { color: var(--dare-color); }
  h1.logo .or {
    font-style: normal;
    font-weight: 400;
    font-size: 1.4rem;
    color: var(--text-dim);
    vertical-align: middle;
    padding: 0 6px;
  }

  .tagline {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .card {
    background: var(--bg-card);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .mode-btn {
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 28px 16px;
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
    text-align: center;
  }
  .mode-btn .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
  .mode-btn:hover { transform: translateY(-3px); border-color: var(--yellow); }
  .mode-btn:nth-child(1):hover { border-color: var(--teal); }
  .mode-btn:nth-child(2):hover { border-color: var(--pink); }

  .section-title {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .player-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 2px solid #3a3450;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s ease;
  }
  input[type="text"]:focus { border-color: var(--teal); }

  .icon-btn {
    background: var(--bg);
    border: 2px solid #3a3450;
    border-radius: 10px;
    color: var(--text);
    font-size: 1.3rem;
    width: 46px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .icon-btn:hover { border-color: var(--pink); }

  .player-list {
    list-style: none;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .player-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.95rem;
  }
  .player-list li button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0;
    line-height: 1;
  }
  .player-list li button:hover { color: var(--pink); }

  .empty-hint {
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
    padding: 12px 0;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--pink), #ff7a3d);
    color: #1a1722;
  }
  .btn-primary:disabled {
    background: #3a3450;
    color: var(--text-dim);
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    border: 2px solid #3a3450;
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--teal); color: var(--text); }

  /* Game screen */
  .current-player {
    text-align: center;
    color: var(--yellow);
    font-weight: 800;
    font-size: 1.2rem;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    min-height: 1.5em;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .choice-btn {
    border: none;
    border-radius: 16px;
    padding: 30px 10px;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    color: #1a1722;
  }
  .choice-btn:hover { transform: translateY(-3px); }
  .choice-btn.truth { background: var(--truth-color); box-shadow: 0 6px 20px rgba(61,218,215,0.3); }
  .choice-btn.dare { background: var(--dare-color); box-shadow: 0 6px 20px rgba(255,61,127,0.3); }

  .prompt-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 36px 24px;
    text-align: center;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    border: 2px solid #3a3450;
    animation: pop 0.35s ease;
  }
  @keyframes pop {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .prompt-card.truth-bg { border-color: var(--truth-color); }
  .prompt-card.dare-bg { border-color: var(--dare-color); }

  .prompt-label {
    position: absolute;
  }

  .prompt-text {
    font-family: Georgia, serif;
    font-size: 1.25rem;
    line-height: 1.4;
    font-weight: 700;
  }

  .prompt-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .prompt-tag.truth { background: rgba(61,218,215,0.15); color: var(--truth-color); }
  .prompt-tag.dare { background: rgba(255,61,127,0.15); color: var(--dare-color); }

  .prompt-wrap { display: flex; flex-direction: column; align-items: center; }

  .back-link {
    display: block;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 18px;
    cursor: pointer;
    text-decoration: underline;
  }
  .back-link:hover { color: var(--text); }

  .intensity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .intensity-btn {
    background: var(--bg);
    border: 2px solid #3a3450;
    border-radius: 16px;
    padding: 24px 14px;
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
    text-align: center;
  }
  .intensity-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
  .intensity-btn .sub {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .intensity-btn:hover { transform: translateY(-3px); }
  .intensity-btn.normal:hover { border-color: var(--teal); }
  .intensity-btn.extreme:hover { border-color: var(--pink); }
  .intensity-btn.selected.normal { border-color: var(--teal); background: rgba(61,218,215,0.08); }
  .intensity-btn.selected.extreme { border-color: var(--pink); background: rgba(255,61,127,0.08); }

  .mode-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 14px;
  }
  .mode-badge.normal { background: rgba(61,218,215,0.15); color: var(--truth-color); }
  .mode-badge.extreme { background: rgba(255,61,127,0.15); color: var(--dare-color); }
  .badge-row { text-align: center; }

  @media (max-width: 380px) {
    h1.logo { font-size: 2.3rem; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="app">
  <h1 class="logo"><span>Truth</span><span class="or">or</span><span>Dare</span></h1>
  <p class="tagline">pick your poison</p>

  <!-- SCREEN 1: Mode Select -->
  <div class="screen active" id="screen-mode">
    <div class="card">
      <div class="section-title">How are you playing?</div>
      <div class="mode-grid">
        <button class="mode-btn" onclick="selectMode('solo')">
          <span class="icon">🎯</span>
          Solo
        </button>
        <button class="mode-btn" onclick="selectMode('group')">
          <span class="icon">👥</span>
          Group
        </button>
      </div>
    </div>
  </div>

  <!-- SCREEN 0: Intensity Select -->
  <div class="screen" id="screen-intensity">
    <div class="card">
      <div class="section-title">Choose your level</div>
      <div class="intensity-grid">
        <button class="intensity-btn normal" onclick="selectIntensity('normal')">
          <span class="icon">😄</span>
          Normal
          <span class="sub">Fun &amp; lighthearted</span>
        </button>
        <button class="intensity-btn extreme" onclick="selectIntensity('extreme')">
          <span class="icon">🔥</span>
          Extreme
          <span class="sub">Bold &amp; spicy</span>
        </button>
      </div>
      <div class="back-link" onclick="goBackFromIntensity()">Back</div>
    </div>
  </div>

  <!-- SCREEN 2: Group Setup -->
  <div class="screen" id="screen-setup">
    <div class="card">
      <div class="section-title">Who's playing?</div>
      <label for="player-name">Add a player</label>
      <div class="player-input-row">
        <input type="text" id="player-name" placeholder="Enter a name" maxlength="20" onkeydown="if(event.key==='Enter'){addPlayer()}">
        <button class="icon-btn" onclick="addPlayer()" aria-label="Add player">+</button>
      </div>
      <ul class="player-list" id="player-list"></ul>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="goTo('mode')">Back</button>
        <button class="btn btn-primary" id="start-group-btn" disabled onclick="goToIntensityFromSetup()">Next</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: Game -->
  <div class="screen" id="screen-game">
    <div class="card">
      <div class="badge-row">
        <span class="mode-badge" id="game-intensity-badge"></span>
      </div>
      <div class="current-player" id="current-player"></div>

      <div class="choice-grid" id="choice-grid">
        <button class="choice-btn truth" onclick="showPrompt('truth')">Truth</button>
        <button class="choice-btn dare" onclick="showPrompt('dare')">Dare</button>
      </div>

      <div class="prompt-card" id="prompt-card" style="display:none;">
        <div class="prompt-wrap">
          <span class="prompt-tag" id="prompt-tag"></span>
          <div class="prompt-text" id="prompt-text"></div>
        </div>
      </div>

      <div class="btn-row" id="next-row" style="display:none;">
        <button class="btn btn-primary" onclick="nextTurn()">Next turn</button>
      </div>

      <div class="back-link" onclick="goTo('mode')">Quit game</div>
    </div>
  </div>
</div>

<script>

    "Let {target} send a message from your phone (group decides what it says).",
    "Confess {scenario} to the group, no skipping details.",
    "Do your best impression of {target}'s texting style.",
    "Show the group the last thing you searched for online.",
    "Let {target} pick your profile picture for the next hour.",
    "Re-enact {scenario} as a dramatic monologue.",
    "Let the group rename one app on your phone — you can't change it back tonight.",
    "Call or message someone and say something the group decides (nothing harmful).",
    "Admit the last white lie you told and who you told it to.",
    "Let {target} read your most recent saved notes or drafts (skip anything truly private).",
    "Do a dramatic reading of your last argument, playing both people.",
    "Reveal which person in this room you'd swap a secret with, and why.",
    "Let {target} ask you one question you have to answer 100% honestly."
  ];

  const genAccents = [
    "a pirate", "a robot", "royalty", "a news anchor", "a game show host",
    "a movie villain", "a toddler", "an old-timey radio host"
  ];

  const genCharacters = [
    "a robot running out of battery", "someone walking on hot sand",
    "a penguin", "a zombie", "someone in slow motion", "a marching soldier",
    "a cat stalking something", "someone who just won the lottery"
  ];

  const genScenarios = [
    "your most awkward first impression of someone",
    "the last time you panicked over nothing",
    "a time you said the wrong name to someone",
    "the last time you tripped or embarrassed yourself in public",
    "a moment you wish no one saw",
    "the last time you got caught talking about someone",
    "a time you pretended to understand something you didn't",
    "the last time you overreacted to something small",
    "a moment you laughed at the worst possible time",
    "the last time you sent a message to the wrong person"
  ];

  const genCounts = ["5", "8", "10", "12", "15"];

  function pickRandomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function fillTemplate(template) {
    let target = 'the person on your left';
    if (mode === 'group' && players.length > 1) {
      const others = players.filter((_, i) => i !== currentPlayerIndex);
      target = pickRandomFrom(others);
    } else if (mode === 'group' && players.length === 1) {
      target = players[0];
    }
    return template
      .replace(/{topic}/g, pickRandomFrom(intensity === 'extreme' ? genTopicsExtreme : genTopicsNormal))
      .replace(/{target}/g, target)
      .replace(/{accent}/g, pickRandomFrom(genAccents))
      .replace(/{character}/g, pickRandomFrom(genCharacters))
      .replace(/{scenario}/g, pickRandomFrom(genScenarios))
      .replace(/{count}/g, pickRandomFrom(genCounts));
  }

  function generatePrompt(type) {
    if (type === 'truth') {
      const openers = intensity === 'extreme' ? genTruthOpenersExtreme : genTruthOpenersNormal;
      return fillTemplate(pickRandomFrom(openers));
    } else {
      const actions = intensity === 'extreme' ? genDareActionsExtreme : genDareActionsNormal;
      return fillTemplate(pickRandomFrom(actions));
    }
  }

  // ---------- State ----------
  let intensity = 'normal'; // 'normal' | 'extreme'
  let mode = null; // 'solo' | 'group'
  let players = [];
  let currentPlayerIndex = -1;
  let usedTruths = [];
  let usedDares = [];

  // ---------- Navigation ----------
  function goTo(screen) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');
  }

  function selectIntensity(level) {
    intensity = level;
    if (mode === 'solo') {
      resetUsedLists();
      enterGame();
    } else {
      resetUsedLists();
      pickRandomPlayer();
      enterGame();
    }
  }

  function selectMode(m) {
    mode = m;
    if (m === 'solo') {
      players = ['You'];
      currentPlayerIndex = 0;
      goTo('intensity');
    } else {
      players = [];
      renderPlayerList();
      goTo('setup');
    }
  }

  function goToIntensityFromSetup() {
    if (players.length < 2) return;
    goTo('intensity');
  }

  function goBackFromIntensity() {
    if (mode === 'group') {
      goTo('setup');
    } else {
      goTo('mode');
    }
  }

  // ---------- Group setup ----------
  function addPlayer() {
    const input = document.getElementById('player-name');
    const name = input.value.trim();
    if (!name) return;
    players.push(name);
    input.value = '';
    renderPlayerList();
    input.focus();
  }

  function removePlayer(index) {
    players.splice(index, 1);
    renderPlayerList();
  }

  function renderPlayerList() {
    const list = document.getElementById('player-list');
    list.innerHTML = '';
    if (players.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'No players yet — add at least 2 to start.';
      list.appendChild(hint);
    } else {
      players.forEach((name, i) => {
        const li = document.createElement('li');
        const span = document.createElement('span');
        span.textContent = name;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.setAttribute('aria-label', 'Remove ' + name);
        btn.onclick = () => removePlayer(i);
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }
    document.getElementById('start-group-btn').disabled = players.length < 2;
  }

  // ---------- Game ----------
  function resetUsedLists() {
    usedTruths = [];
    usedDares = [];
  }

  function pickRandomPlayer() {
    let idx = Math.floor(Math.random() * players.length);
    // avoid same player twice in a row if more than one player
    if (players.length > 1 && idx === currentPlayerIndex) {
      idx = (idx + 1) % players.length;
    }
    currentPlayerIndex = idx;
  }

  function enterGame() {
    updateCurrentPlayerLabel();
    const badge = document.getElementById('game-intensity-badge');
    badge.textContent = intensity === 'extreme' ? '🔥 Extreme mode' : '😄 Normal mode';
    badge.className = 'mode-badge ' + intensity;
    document.getElementById('choice-grid').style.display = 'grid';
    document.getElementById('prompt-card').style.display = 'none';
    document.getElementById('next-row').style.display = 'none';
    goTo('game');
  }

  function updateCurrentPlayerLabel() {
    const label = document.getElementById('current-player');
    if (mode === 'solo') {
      label.textContent = "Your turn — Truth or Dare?";
    } else {
      label.textContent = players[currentPlayerIndex] + "'s turn — Truth or Dare?";
    }
  }

  function pickPrompt(list, used) {
    if (used.length >= list.length) {
      used.length = 0; // reset once exhausted
    }
    let idx;
    do {
      idx = Math.floor(Math.random() * list.length);
    } while (used.includes(idx));
    used.push(idx);
    return list[idx];
  }

  // Tracks recently-generated prompts to avoid back-to-back duplicates
  let recentGenerated = [];
  const MAX_RECENT_GENERATED = 25;

  function pickPromptOrGenerate(curatedList, used, type) {
    // First pass through the curated list: always prefer fresh curated prompts.
    if (used.length < curatedList.length) {
      return pickPrompt(curatedList, used);
    }
    // Curated pool exhausted for this pass — generate a fresh combination.
    let prompt;
    let attempts = 0;
    do {
      prompt = generatePrompt(type);
      attempts++;
    } while (recentGenerated.includes(prompt) && attempts < 10);
    recentGenerated.push(prompt);
    if (recentGenerated.length > MAX_RECENT_GENERATED) {
      recentGenerated.shift();
    }
    // Occasionally allow curated prompts to resurface too, once in a while
    if (Math.random() < 0.15) {
      used.length = 0;
      return pickPrompt(curatedList, used);
    }
    return prompt;
  }

  function showPrompt(type) {
    const card = document.getElementById('prompt-card');
    const tag = document.getElementById('prompt-tag');
    const text = document.getElementById('prompt-text');

    let prompt;
    if (type === 'truth') {
      const pool = intensity === 'extreme' ? truthsExtreme : truthsNormal;
      prompt = pickPromptOrGenerate(pool, usedTruths, 'truth');
      tag.textContent = 'Truth';
      tag.className = 'prompt-tag truth';
      card.className = 'prompt-card truth-bg';
    } else {
      const pool = intensity === 'extreme' ? daresExtreme : daresNormal;
      prompt = pickPromptOrGenerate(pool, usedDares, 'dare');
      tag.textContent = 'Dare';
      tag.className = 'prompt-tag dare';
      card.className = 'prompt-card dare-bg';
    }

    text.textContent = prompt;
    card.style.display = 'flex';
    document.getElementById('choice-grid').style.display = 'none';
    document.getElementById('next-row').style.display = 'flex';
  }

  function nextTurn() {
    if (mode === 'group') {
      pickRandomPlayer();
    }
    updateCurrentPlayerLabel();
    document.getElementById('choice-grid').style.display = 'grid';
    document.getElementById('prompt-card').style.display = 'none';
    document.getElementById('next-row').style.display = 'none';
  }

  // init
  renderPlayerList();
</script>

</body>
</html>
